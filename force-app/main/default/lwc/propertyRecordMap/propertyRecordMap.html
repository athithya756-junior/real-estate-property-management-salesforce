<template>
    <lightning-card title="Property Location">
        <template if:true={hasMapMarkers}>
            <lightning-map map-markers={mapMarkers} zoom-level="14"></lightning-map>
        </template>
        <template if:false={hasMapMarkers}>
            <div class="slds-p-around_medium">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading property location" size="small"></lightning-spinner>
                </template>
                <template if:false={isLoading}>
                    <template if:true={errorMessage}>{errorMessage}</template>
                    <template if:false={errorMessage}>No geocoded location is available.</template>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
