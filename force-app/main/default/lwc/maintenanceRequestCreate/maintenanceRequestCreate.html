<template>
    <lightning-card title="Create Maintenance Request">
        <div class="slds-p-around_medium form-grid">
            <lightning-combobox label="Property" value={propertyId} options={propertyOptions} onchange={handleProperty}></lightning-combobox>
            <lightning-textarea label="Description" value={description} onchange={handleDescription}></lightning-textarea>
            <lightning-button label="Create Request" variant="brand" onclick={saveRequest}></lightning-button>
        </div>
        <template if:true={createdRequest}>
            <div class="slds-p-around_medium">
                Request {createdRequest.Name} assigned to {createdRequest.Vendor__r.Name}.
            </div>
        </template>
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <lightning-datatable key-field="Id" data={requests} columns={columns} hide-checkbox-column></lightning-datatable>
        </div>
    </lightning-card>
</template>
